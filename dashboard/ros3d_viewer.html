<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <style>
    body {
      background-color: #1e1e1e;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #viewer {
      width: 100%;
      height: 100%;
    }
  </style>
  <script type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/eventemitter2@6.4.9/lib/eventemitter2.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/ros3d@3/build/ros3d.min.js"></script>

  <script type="text/javascript" type="text/javascript">
    function init() {
      // Attempting to connect to ROSBridge on localhost
      var ros = new ROSLIB.Ros({
        url: 'ws://localhost:9090'
      });

      // Create the main viewer.
      var viewer = new ROS3D.Viewer({
        divID: 'viewer',
        width: window.innerWidth,
        height: window.innerHeight,
        antialias: true,
        background: '#1e1e1e'
      });

      // Add a grid.
      viewer.addObject(new ROS3D.Grid({ color: '#444444', cells: 10, size: 1 }));

      // Setup a client to listen to TFs.
      var tfClient = new ROSLIB.TFClient({
        ros: ros,
        angularThres: 0.01,
        transThres: 0.01,
        rate: 20.0,
        fixedFrame: 'base_link'
      });

      // Setup the URDF client.
      var urdfClient = new ROS3D.UrdfClient({
        ros: ros,
        tfClient: tfClient,
        path: 'http://localhost:8080/', // Path to your meshes served by a local web server (e.g. roswww)
        rootObject: viewer.scene,
        loader: ROS3D.COLLADA_LOADER_2
      });

      // Handle Resize
      window.addEventListener('resize', function () {
        viewer.resize(window.innerWidth, window.innerHeight);
      });

      ros.on('connection', function () {
        console.log('Connected to websocket server.');
      });

      ros.on('error', function (error) {
        console.log('Error connecting to websocket server: ', error);
        document.getElementById('viewer').innerHTML = "<div style='padding:20px'><h2>Pas de connexion au simulateur (Rosbridge: ws://localhost:9090)</h2><p>Veuillez lancer <b>ros2 run rosbridge_server rosbridge_websocket</b> ainsi que le jumeau numérique Staubli.</p></div>";
      });

      ros.on('close', function () {
        console.log('Connection to websocket server closed.');
      });
    }
  </script>
</head>

<body onload="init()">
  <div id="viewer"></div>
</body>

</html>
